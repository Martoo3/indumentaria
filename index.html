<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <title>FAUSZA | Tienda de Ropa</title>

    <!-- FOTO DE LA PESTAÑA (FAVICON) -->
    <link rel="icon" type="image/png" href="favicon.png">

    <style>
      body {
        background-color: #0f172a;
        color: white;
        font-family: Arial;
        text-align: center;
        margin: 0;
        padding: 0;
      }

      /* HEADER */
      header {
        padding: 30px 20px 10px;
      }

      .logo {
        width: 280px;
        max-width: 90%;
        margin-bottom: 10px;
      }

      h1 {
        color: cyan;
        margin-top: 10px;
      }

      p {
        color: #cbd5e1;
      }

      .tienda {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        padding: 20px;
      }

      .producto {
        border: 2px solid cyan;
        border-radius: 10px;
        padding: 10px;
        transition: 0.3s;
        background-color: #111827;
      }

      .producto:hover {
        transform: scale(1.05);
        box-shadow: 0 0 10px cyan;
      }

      .producto img {
        width: 100%;
        border-radius: 10px;
      }

      button {
        background: transparent;
        color: cyan;
        border: 2px solid cyan;
        padding: 10px;
        margin-top: 10px;
        border-radius: 10px;
        cursor: pointer;
        font-weight: bold;
      }

      button:hover {
        background: cyan;
        color: black;
      }
    </style>
  </head>

  <body>

    <!-- LOGO -->
    <header>
      <img src="fausza-logo.png" alt="FAUSZA Logo" class="logo">

      <h1>🛍️ Tienda de Ropa</h1>

      <p>Comprá directo por WhatsApp 😎</p>
    </header>

    <!-- PRODUCTOS -->
    <div class="tienda">

      <div class="producto">
        <img src="ropa1.jpg" />
        <h3>Remera De Boca</h3>
        <p>$20 USD</p>
        <button onclick="comprar()">Comprar</button>
      </div>

      <div class="producto">
        <img src="ropa2.jpg" />
        <h3>Remera De Racing</h3>
        <p>$35 USD</p>
        <button onclick="comprar()">Comprar</button>
      </div>

      <div class="producto">
        <img src="ropa3.jpg" />
        <h3>Remera De River</h3>
        <p>$40 USD</p>
        <button onclick="comprar()">Comprar</button>
      </div>

      <div class="producto">
        <img src="ropa4.jpg" />
        <h3>Remera De Boca</h3>
        <p>$20 USD</p>
        <button onclick="comprar()">Comprar</button>
      </div>

      <div class="producto">
        <img src="ropa5.jpg" />
        <h3>Remera De Racing</h3>
        <p>$35 USD</p>
        <button onclick="comprar()">Comprar</button>
      </div>

      <div class="producto">
        <img src="ropa6.jpg" />
        <h3>Remera De River</h3>
        <p>$40 USD</p>
        <button onclick="comprar()">Comprar</button>
      </div>

    </div>

    <script>
      function comprar() {
        window.open("https://wa.me/123456789", "_blank");
      }
    </script>

  </body>
</html>
